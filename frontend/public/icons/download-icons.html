<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Icon AE - PWA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }

    h1 {
      color: #111D4A;
      font-size: 24px;
      text-align: center;
    }

    p {
      color: #666;
      font-size: 14px;
      text-align: center;
      max-width: 500px;
    }

    .icon-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .icon-label {
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }

    .download-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #C9A84C 0%, #B8922A 100%);
      color: #111D4A;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(201, 168, 76, 0.4);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .download-btn svg {
      width: 18px;
      height: 18px;
    }

    .icons-row {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .note {
      background: #FFF9E6;
      border: 1px solid #C9A84C;
      padding: 15px 20px;
      border-radius: 10px;
      max-width: 500px;
      text-align: center;
    }

    .note h3 {
      color: #111D4A;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .note p {
      font-size: 13px;
      color: #666;
    }

    .note code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>📥 Download Icon AE untuk PWA</h1>
  <p>Klik tombol download di bawah untuk menyimpan icon AE dalam format PNG</p>

  <div class="icons-row">
    <div class="icon-container">
      <canvas id="icon-192" width="192" height="192"></canvas>
      <span class="icon-label">192 x 192 px</span>
      <button class="download-btn" onclick="downloadIcon(192)">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Download
      </button>
    </div>

    <div class="icon-container">
      <canvas id="icon-512" width="512" height="512"></canvas>
      <span class="icon-label">512 x 512 px</span>
      <button class="download-btn" onclick="downloadIcon(512)">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Download
      </button>
    </div>
  </div>

  <div class="note">
    <h3>📁 Simpan ke folder:</h3>
    <p>
      Letakkan file hasil download di:<br>
      <code>frontend/public/icons/</code><br><br>
      Rename file menjadi:<br>
      <code>icon-192.png</code> dan <code>icon-512.png</code>
    </p>
  </div>

  <script>
    // Generate icon AE
    function drawIcon(size) {
      const canvas = document.getElementById(`icon-${size}`);
      const ctx = canvas.getContext('2d');
      const centerX = size / 2;
      const centerY = size / 2;
      const radius = size * 0.42;

      // Background gradient (gold)
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#D4A84B');
      gradient.addColorStop(1, '#B8922A');

      // Draw rounded rectangle background
      const cornerRadius = size * 0.15;
      ctx.beginPath();
      ctx.roundRect(size * 0.08, size * 0.08, size * 0.84, size * 0.84, cornerRadius);
      ctx.fillStyle = gradient;
      ctx.fill();

      // Add subtle inner glow
      ctx.shadowColor = 'rgba(201, 168, 76, 0.5)';
      ctx.shadowBlur = size * 0.1;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;

      // Draw text "AE"
      ctx.fillStyle = '#111D4A';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `bold ${size * 0.38}px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif`;
      ctx.fillText('AE', centerX, centerY + size * 0.02);
    }

    // Download icon
    function downloadIcon(size) {
      const canvas = document.getElementById(`icon-${size}`);
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Draw both icons on load
    window.onload = function() {
      drawIcon(192);
      drawIcon(512);
    };
  </script>
</body>
</html>
